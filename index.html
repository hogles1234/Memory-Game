<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Pro | Multi-Device P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #4a90e2; --secondary: #f39c12; --danger: #e74c3c;
            --success: #2ecc71; --dark: #1a1a2e; --light: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; }
        .container { max-width: 900px; margin: auto; padding: 20px; text-align: center; }
        .hidden { display: none; }

        /* 2.5D Interface */
        #game-board { display: flex; flex-wrap: wrap; gap: 10px; perspective: 1000px; justify-content: center; }
        .card { width: 100px; height: 100px; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex;
                     align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 12px;
                     border: 4px solid white; box-shadow: 0 8px 15px rgba(0,0,0,0.1); text-align: center; padding: 5px; }
        .card-front { background: var(--primary); color: white; }
        .card-back { background: white; transform: rotateY(180deg); font-weight: bold; }
        .matched .card-back { background: var(--success); color: white; }

        /* UI Elements */
        .panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; background: var(--primary); margin: 5px; }
        .id-badge { background: var(--dark); color: var(--secondary); padding: 5px 15px; border-radius: 20px; font-family: monospace; font-size: 1.2rem; }
        .monitor-card { background: var(--dark); color: white; padding: 15px; border-radius: 10px; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>

    <div id="setup-view" class="container">
        <h1>Memory Match Pro</h1>
        <p>Choose your role to begin P2P session</p>
        <button class="btn" onclick="startPeer('instructor')">👨‍🏫 Instructor (Host)</button>
        <button class="btn" style="background: var(--secondary);" onclick="showStudentJoin()">🎓 Student (Join)</button>

        <div id="join-ui" class="hidden" style="margin-top: 20px;">
            <input type="text" id="join-id" placeholder="Enter Session ID" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
            <button class="btn" onclick="startPeer('student')">Connect</button>
        </div>
    </div>

    <div id="instructor-view" class="container hidden">
        <div class="panel">
            <h3>Instructor Dashboard</h3>
            <p>Share this Session ID with students: <span id="my-id" class="id-badge">...</span></p>
            <hr>
            <label>Mode:</label>
            <select id="cfg-mode">
                <option value="memory">Standard Memory</option>
                <option value="sequence">Operational Sequence</option>
            </select>
            <button class="btn" onclick="broadcastConfig()">Push Config to All Students</button>
        </div>
        <div id="student-list" class="monitor-card">Waiting for students...</div>
    </div>

    <div id="student-view" class="container hidden">
        <div class="panel" style="display:flex; justify-content: space-between; align-items: center;">
            <div id="status">Connected to Instructor</div>
            <div id="stats">Matches: 0</div>
        </div>
        <div id="game-board"></div>
    </div>

<script>
    let peer, conn;
    let myId;
    let isInstructor = false;
    const students = {};

    function showStudentJoin() { document.getElementById('join-ui').classList.remove('hidden'); }

    function startPeer(role) {
        isInstructor = (role === 'instructor');
        peer = new Peer(); // PeerJS handles the serverless connection logic

        peer.on('open', (id) => {
            myId = id;
            document.getElementById('setup-view').classList.add('hidden');
            if (isInstructor) {
                document.getElementById('instructor-view').classList.remove('hidden');
                document.getElementById('my-id').innerText = id;
                setupInstructorListeners();
            } else {
                document.getElementById('student-view').classList.remove('hidden');
                const targetId = document.getElementById('join-id').value;
                conn = peer.connect(targetId);
                setupStudentListeners();
            }
        });
    }

    // --- Instructor Logic ---
    function setupInstructorListeners() {
        peer.on('connection', (c) => {
            c.on('data', (data) => {
                students[c.peer] = data;
                updateMonitor();
            });
        });
    }

    function broadcastConfig() {
        const mode = document.getElementById('cfg-mode').value;
        // In PeerJS, we send to all connected peers
        Object.values(peer.connections).forEach(conns => {
            conns[0].send({ type: 'CONFIG', mode: mode });
        });
    }

    function updateMonitor() {
        const list = document.getElementById('student-list');
        list.innerHTML = '<h4>Active Students</h4>';
        Object.entries(students).forEach(([id, data]) => {
            list.innerHTML += `<div><strong>${id}</strong>: ${data.matches} matches | Pace: ${data.pace}s</div>`;
        });
    }

    // --- Student Logic ---
    function setupStudentListeners() {
        conn.on('open', () => {
            conn.send({ matches: 0, pace: 0 });
        });

        conn.on('data', (data) => {
            if (data.type === 'CONFIG') {
                initGame(data.mode);
            }
        });
    }

    let matchCount = 0;
    function initGame(mode) {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        matchCount = 0;

        if (mode === 'memory') {
            const items = ['🦁', '🐯', '🐘', '🦒', '🦁', '🐯', '🐘', '🦒'];
            items.sort(() => Math.random() - 0.5);
            items.forEach(val => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="card-face card-front">?</div><div class="card-face card-back">${val}</div>`;
                card.onclick = () => {
                    card.classList.toggle('flipped');
                    matchCount++; // Simple simulation
                    document.getElementById('stats').innerText = `Matches: ${matchCount}`;
                    conn.send({ matches: matchCount, pace: 1.2 });
                };
                board.appendChild(card);
            });
        } else {
            // Sequence logic here...
            board.innerHTML = "<h3>Sequence Mode Activated</h3><p>Arrange steps in order...</p>";
        }
    }
</script>
</body>
</html>
