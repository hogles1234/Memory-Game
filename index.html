<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Pro | Unified Suite</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #4a90e2; --secondary: #f39c12; --danger: #e74c3c;
            --success: #2ecc71; --dark: #1a1a2e; --light: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; overflow-x: hidden; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .hidden { display: none; }
        .flex-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }

        /* Card Engine 2.5D */
        #game-board { display: grid; gap: 15px; perspective: 1000px; margin: 20px auto; justify-content: center; }
        .card { width: 110px; height: 110px; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 4px solid white; box-shadow: 0 8px 15px rgba(0,0,0,0.1); font-weight: bold; font-size: 1.2rem; text-align: center; padding: 5px; }
        .card-front { background: linear-gradient(135deg, var(--primary), #2980b9); color: white; font-size: 2rem; }
        .card-back { background: white; transform: rotateY(180deg); color: var(--dark); }
        .matched .card-back { background: var(--success); color: white; border-color: #27ae60; }

        /* Sequence Mode */
        .seq-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .seq-item { background: white; padding: 15px 25px; border-radius: 10px; border: 3px solid var(--primary); cursor: pointer; width: 80%; max-width: 400px; font-weight: bold; transition: 0.3s; }
        .seq-item.correct { border-color: var(--success); background: #e8f5e9; pointer-events: none; }

        /* Dashboard & UI */
        .panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .monitor-card { background: var(--dark); color: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 8px solid var(--success); display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; align-items: center; }
        .monitor-card.flagged { border-left-color: var(--danger); background: #2d142c; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; background: var(--primary); transition: 0.2s; }
        .btn-s { background: var(--secondary); }
        .input-box { padding: 12px; border: 2px solid #ddd; border-radius: 8px; width: 250px; margin: 10px; }
    </style>
</head>
<body>

    <div id="setup-view" class="container flex-center">
        <h1>Memory Match Pro</h1>
        <div class="panel">
            <button class="btn" onclick="startPeer('instructor')">👨‍🏫 Host Instructor Session</button>
            <div style="margin: 20px 0; font-weight: bold; color: #999;">— OR —</div>
            <input type="text" id="join-id" class="input-box" placeholder="Enter Session ID">
            <button class="btn btn-s" onclick="startPeer('student')">🎓 Join as Student</button>
        </div>
    </div>

    <div id="instructor-view" class="container hidden">
        <div class="panel">
            <h2>Session Host: <span id="my-id" style="color:var(--primary); font-family: monospace;">...</span></h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div>
                    <label>Mode</label>
                    <select id="cfg-mode" style="width:100%; padding:8px;">
                        <option value="memory">2.5D Memory Match</option>
                        <option value="sequence">Alternative Sequence</option>
                    </select>
                </div>
                <div>
                    <label>Category</label>
                    <select id="cfg-data" style="width:100%; padding:8px;">
                        <option value="math">Math Logic</option>
                        <option value="animals">Animals</option>
                    </select>
                </div>
                <div>
                    <label>Difficulty</label>
                    <select id="cfg-diff" style="width:100%; padding:8px;">
                        <option value="Easy">Easy</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                </div>
            </div>
            <button class="btn" style="margin-top:15px; width:100%;" onclick="broadcastConfig()">Push Session Configuration</button>
        </div>
        <h3>Live Monitoring Dashboard</h3>
        <div id="monitor-feed"></div>
        <button class="btn btn-s" onclick="exportCSV()">Export CSV Report</button>
    </div>

    <div id="student-view" class="container hidden">
        <div class="panel" style="display:flex; justify-content:space-between; align-items:center;">
            <div id="game-status" style="font-weight:bold;">Waiting for Instructor...</div>
            <div id="game-stats">Matches: 0 | Moves: 0</div>
        </div>
        <div id="game-engine"></div>
    </div>

<script>
    const peer = new Peer();
    let conn;
    let isInstructor = false;
    const roster = {};
    const datasets = {
        math: [{q:'5+5', a:'10'}, {q:'12-4', a:'8'}, {q:'3x4', a:'12'}, {q:'20/2', a:'10'}, {q:'9+1', a:'10'}, {q:'15-5', a:'10'}],
        animals: [{q:'🦁', a:'Lion'}, {q:'🐘', a:'Elephant'}, {q:'🦒', a:'Giraffe'}, {q:'🦓', a:'Zebra'}, {q:'🐵', a:'Monkey'}, {q:'🐷', a:'Pig'}],
        sequence: [{o:1, t:'Turn on Tap'}, {o:2, t:'Apply Soap'}, {o:3, t:'Scrub Hands'}, {o:4, t:'Rinse Off'}, {o:5, t:'Dry with Towel'}]
    };

    let state = { moves: 0, matches: 0, lastClick: 0, paces: [], seqIndex: 1 };

    peer.on('open', id => { document.getElementById('my-id').innerText = id; });

    function startPeer(role) {
        isInstructor = (role === 'instructor');
        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById(role + '-view').classList.remove('hidden');

        if (isInstructor) {
            peer.on('connection', c => {
                c.on('data', data => { roster[c.peer] = data; updateDashboard(); });
            });
        } else {
            conn = peer.connect(document.getElementById('join-id').value);
            conn.on('data', data => { if(data.type === 'SYNC') initGame(data.config); });
        }
    }

    // --- Instructor Logic ---
    function broadcastConfig() {
        const config = {
            mode: document.getElementById('cfg-mode').value,
            data: document.getElementById('cfg-data').value,
            diff: document.getElementById('cfg-diff').value
        };
        Object.values(peer.connections).forEach(conns => conns[0].send({ type: 'SYNC', config }));
    }

    function updateDashboard() {
        const feed = document.getElementById('monitor-feed');
        feed.innerHTML = '';
        Object.entries(roster).forEach(([id, s]) => {
            const isFlagged = s.acc < 50 && s.moves > 4;
            feed.innerHTML += `
                <div class="monitor-card ${isFlagged ? 'flagged' : ''}">
                    <strong>${id}</strong>
                    <span>Moves: ${s.moves}</span>
                    <span>Acc: ${s.acc}%</span>
                    <span>Pace: ${s.pace}s</span>
                </div>`;
        });
    }

    // --- Student Logic ---
    function initGame(cfg) {
        const engine = document.getElementById('game-engine');
        engine.innerHTML = '';
        state = { moves: 0, matches: 0, lastClick: 0, paces: [], seqIndex: 1 };
        document.getElementById('game-status').innerText = `${cfg.mode.toUpperCase()} - ${cfg.diff}`;

        if (cfg.mode === 'memory') {
            const count = cfg.diff === 'Easy' ? 4 : (cfg.diff === 'Medium' ? 6 : 8);
            let deck = [];
            datasets[cfg.data].slice(0, count).forEach(i => { deck.push({v:i.a, d:i.q}, {v:i.a, d:i.a}); });
            deck.sort(() => Math.random() - 0.5);

            engine.style.display = 'grid';
            engine.style.gridTemplateColumns = 'repeat(auto-fit, minmax(110px, 1fr))';
            deck.forEach(data => {
                const c = document.createElement('div');
                c.className = 'card';
                c.innerHTML = `<div class="card-face card-front">?</div><div class="card-face card-back">${data.d}</div>`;
                c.dataset.v = data.v;
                c.onclick = () => handleFlip(c);
                engine.appendChild(c);
            });
            // Pre-Game Exposure
            document.querySelectorAll('.card').forEach(c => c.classList.add('flipped'));
            setTimeout(() => document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped')), 3000);
        } else {
            engine.style.display = 'block';
            let steps = [...datasets.sequence].sort(() => Math.random() - 0.5);
            const list = document.createElement('div');
            list.className = 'seq-list';
            steps.forEach(s => {
                const item = document.createElement('div');
                item.className = 'seq-item';
                item.innerText = s.t;
                item.onclick = () => {
                    if(s.o === state.seqIndex) {
                        item.classList.add('correct');
                        state.seqIndex++; state.matches++;
                    } else { state.moves++; }
                    sendTelemetry();
                };
                list.appendChild(item);
            });
            engine.appendChild(list);
        }
    }

    let active = [];
    function handleFlip(card) {
        if (active.length === 2 || card.classList.contains('flipped')) return;
        card.classList.add('flipped');
        active.push(card);
        const now = Date.now();
        if(state.lastClick) state.paces.push((now - state.lastClick)/1000);
        state.lastClick = now;

        if (active.length === 2) {
            state.moves++;
            if (active[0].dataset.v === active[1].dataset.v) {
                state.matches++;
                active.forEach(a => a.classList.add('matched'));
                active = [];
            } else {
                setTimeout(() => { active.forEach(a => a.classList.remove('flipped')); active = []; }, 1000);
            }
            sendTelemetry();
        }
    }

    function sendTelemetry() {
        const pace = state.paces.length ? (state.paces.reduce((a,b)=>a+b)/state.paces.length).toFixed(1) : 0;
        const acc = state.moves > 0 ? Math.round((state.matches/state.moves)*100) : 100;
        document.getElementById('game-stats').innerText = `Matches: ${state.matches} | Moves: ${state.moves}`;
        conn.send({ moves: state.moves, matches: state.matches, acc, pace });
    }

    function exportCSV() {
        let csv = "ID,Moves,Matches,Accuracy,Pace\n";
        Object.entries(roster).forEach(([id, s]) => csv += `${id},${s.moves},${s.matches},${s.acc}%,${s.pace}s\n`);
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'MMP_Report.csv'; a.click();
    }
</script>
</body>
</html>
